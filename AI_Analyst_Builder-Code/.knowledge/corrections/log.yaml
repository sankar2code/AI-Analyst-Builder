#     category: "join_error"  # join_error | filter_missing | metric_definition | date_range | aggregation | other
#     dataset: "my_dataset"
#     tables: ["orders", "users"]
#     description: "Inner join dropped 15% of orders with null user_id"
#     fix: "Use LEFT JOIN and handle nulls explicitly"
#     sql_before: "SELECT ... FROM orders JOIN users ON ..."
#     sql_after: "SELECT ... FROM orders LEFT JOIN users ON ..."
#     prevented_by: "Always check join cardinality before and after"
