entities:
  conversion_rate:
    type: metric
    display_name: Conversion Rate
    definition: Orders / Sessions
    tables:
    - events
    - orders
  dau:
    type: metric
    display_name: Daily Active Users
    definition: COUNT(DISTINCT user_id) per day
    tables:
    - events
  marketplace:
    type: product
    display_name: Marketplace
    tables:
    - orders
    - products
    - sessions
    team: commerce
  payments:
    type: product
    display_name: Payments
    tables:
    - transactions
    team: fintech
  gmv:
    type: metric
    display_name: GMV
    definition: SUM(order_total)
    tables:
    - orders
    product: marketplace
  aov:
    type: metric
    display_name: Average Order Value
    definition: SUM(order_total) / COUNT(order_id)
    tables:
    - orders
    product: marketplace
  retention_rate:
    type: metric
    display_name: Retention Rate
    definition: Returning users / Total users in cohort
    tables:
    - events
    - users
  checkout:
    type: product
    display_name: Checkout
    tables:
    - orders
    - events
    team: commerce
  search:
    type: product
    display_name: Search
    tables:
    - events
    - search_logs
    team: discovery
  cart_abandonment_rate:
    type: metric
    display_name: Cart Abandonment Rate
    definition: 1 - (Checkouts / Add-to-Carts)
    tables:
    - events
    product: checkout
  revenue:
    type: metric
    display_name: Revenue
    definition: SUM(payment_amount) for completed orders
    tables:
    - orders
    - transactions
  arpu:
    type: metric
    display_name: ARPU
    definition: Revenue / Active Users
    tables:
    - orders
    - users
