# Minimal base theme fixture for testing.
# NOT a copy of _base.yaml — just the essential sections.

theme:
  name: "analytics"
  display_name: "Analytics (Test)"
  version: "1.0"

colors:
  primary: "#4878CF"
  secondary: "#6ACC65"
  neutral: "#B0B0B0"
  background: "#F7F6F2"
  text: "#333333"
  categorical:
    - "#4878CF"
    - "#6ACC65"
    - "#B47CC7"
    - "#D65F5F"
  sequential:
    low: "#E8F4FD"
    mid: "#4878CF"
    high: "#1A3A6C"
  diverging:
    negative: "#D65F5F"
    neutral: "#F7F6F2"
    positive: "#6ACC65"
  highlight:
    focus: "#4878CF"
    comparison: "#B0B0B0"

typography:
  font_family: "Helvetica Neue, Arial, sans-serif"
  sizes:
    title: 18
    body: 11
