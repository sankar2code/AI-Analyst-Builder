# Minimal brand override fixture for testing.
# Only specifies keys that differ from the base.

theme:
  name: "test-brand"
  display_name: "Test Brand"

colors:
  primary: "#0D9488"
  secondary: "#F97316"
  background: "#FAFAF9"
  categorical:
    - "#0D9488"
    - "#F97316"
    - "#6366F1"
